;ZAS —— 全分组防 DNS 泄漏订阅转换模板（重构版）
;原模板作者：Aethersailor（Custom_OpenClash_Rules，原仓库已删库失效）
;重构说明：原 Aethersailor 规则仓库已失效，分流改用 ACL4SSR 规则 + 内置 GEOSITE/GEOIP 重建
;参考模板：ACL4SSR_Online_Full（https://github.com/ACL4SSR/ACL4SSR）
;自定义规则：https://github.com/L0tus0/now-subconverter
;ZAS 工作网络专用：仅代理必要服务（即时通讯/社交媒体/GitHub/AI/ZAS 对策工作工具），其余服务统一走 🚀 节点选择 兜底
;以下规则按从上往下顺序遍历，优先命中上位规则，规则重复无影响，修改顺序会影响分流效果

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;ACL4SSR 收录的直连规则（替代已失效的 Aethersailor 直连规则）
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AccelerateDirectSites.list

;Custom（L0tus0 自定义规则）
ruleset=🎯 全球直连,https://raw.githubusercontent.com/L0tus0/now-subconverter/master/rule/Local.list

;ACL4SSR 收录的代理规则（替代已失效的 Aethersailor 代理规则）
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
;ruleset=🚀 节点选择,https://raw.githubusercontent.com/L0tus0/now-subconverter/master/rule/Proxy.list
;ZAS 工作工具走代理（MathWorks / 飞书 等）
ruleset=💼 ZAS对策,https://raw.githubusercontent.com/L0tus0/now-subconverter/master/rule/ZasProxy.list

;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
;国内游戏域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
;Steam 国区 / 软件下载 CDN 直连（替代已失效的 Aethersailor Steam CDN 规则）
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
;各大游戏平台下载域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

;即时通讯包括了 Telegram/WhatsApp/Line 等海外主流即时通讯软件域名
ruleset=💬 即时通讯,[]GEOSITE,category-communication
;社交媒体包括了 Twitter(X)/Facebook/Instagram 等海外主流社交媒体
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn

ruleset=🤖 ChatBot,[]GEOSITE,openai
ruleset=🤖 ChatBot,[]GEOSITE,bing
ruleset=🤖 ChatBot,[]GEOSITE,category-ai-!cn

;ruleset=🛑 广告拦截,clash-domain:https://anti-ad.net/clash.yaml,86400

ruleset=🚀 GitHub,[]GEOSITE,github
;ZAS 为工作网络，未单设流媒体等分组，其余被墙服务（YouTube/Netflix/Apple/微软/谷歌等）统一走 🚀 节点选择 兜底
ruleset=🚀 节点选择,[]GEOSITE,gfw
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;PT/BT 优化（原 Aethersailor 非标端口直连规则已失效，ACL4SSR 无对应规则集，暂注释）
;ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

