;HomeRouter —— 全分组防 DNS 泄漏订阅转换模板（重构版）
;原模板作者：Aethersailor（Custom_OpenClash_Rules，原仓库已删库失效）
;重构说明：原 Aethersailor 规则仓库已失效，分流改用 ACL4SSR 规则 + 内置 GEOSITE/GEOIP 重建
;参考模板：ACL4SSR_Online_Full（https://github.com/ACL4SSR/ACL4SSR）
;自定义规则：https://github.com/L0tus0/now-subconverter
;以下规则按从上往下顺序遍历，优先命中上位规则，规则重复无影响，修改顺序会影响分流效果

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;广告屏蔽
;ruleset=🛑 广告拦截,clash-domain:https://anti-ad.net/clash.yaml,86400

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;ACL4SSR 收录的直连规则（替代已失效的 Aethersailor 直连规则）
